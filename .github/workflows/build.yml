# .github/workflows/build.yml

# Builds and pushes the Docker image to Docker Hub
name: Build and Push Image

# Triggers every time you push to main
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Pull code from GitHub into the Ubuntu machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Login to Docker Hub using secrets stored in GitHub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build the Docker image from your Dockerfile
      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/parcel-platform:latest .

      # Push the built image to Docker Hub
      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/parcel-platform:latest 
              
