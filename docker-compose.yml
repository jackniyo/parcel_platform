services:
  
  # ── PostgreSQL database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       parcel_platform
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"        # expose so you can still connect with psql locally
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      
  # ── FastAPI application ──────────────────────────────────────────────────────
  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/parcel_platform
      SECRET_KEY:   change-this-to-a-random-string-in-production
    depends_on:
      db:
        condition: service_healthy   # wait for postgres to be ready before starting
    volumes:
      - .:/app   # mount source code so changes reflect without rebuilding
      
volumes:
  postgres_data:
